

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ctest</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">

<!-- Login Screen -->
<div id="loginPage" class="bg-slate-800 p-8 rounded-2xl shadow-xl w-80">
    <h1 class="text-2xl font-bold text-white text-center mb-6">Login</h1>

    <input
        type="password"
        id="password"
        placeholder="Enter Password"
        class="w-full p-3 rounded-lg bg-slate-700 text-white outline-none mb-4"
    >

    <button
        onclick="login()"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold"
    >
        Unlock
    </button>

    <p id="error" class="text-red-400 text-center mt-3 hidden">
        Wrong Password
    </p>
</div>

<!-- Protected Page -->
<div id="homePage" class="hidden text-center">
    <h1 class="text-5xl font-bold text-white">Hello World</h1>
</div>

<script>
function login() {
    const password = document.getElementById("password").value;

    // password
    if (password === "Shreyachinmaypatil") {
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("homePage").classList.remove("hidden");
    } else {
        document.getElementById("error").classList.remove("hidden");
    }
}
</script>

</body>
</html>
